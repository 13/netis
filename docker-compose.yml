# netis docker-compose
#
# A single container serves both the API and the Vue frontend.
#
# Default profile uses SQLite (no extra container).
# Enable the `postgres` profile to switch to PostgreSQL:
#   docker compose --profile postgres up -d
#
# For ARP scanning to work from inside the container the service needs
# CAP_NET_RAW and host-network access (uncomment network_mode below).

services:
  netis:
    build: .
    image: netis:latest
    restart: unless-stopped
    environment:
      NETIS_DATABASE_URL: ${NETIS_DATABASE_URL:-sqlite:////data/netis.db}
      NETIS_SECRET_KEY: ${NETIS_SECRET_KEY:-please-change-me}
      NETIS_ACCESS_TOKEN_EXPIRE_MINUTES: ${NETIS_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    volumes:
      - netis-data:/data
    cap_add:
      - NET_RAW
    # Uncomment to allow ARP scans of the host network:
    # network_mode: host
    ports:
      - "8080:8000"

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: netis
      POSTGRES_PASSWORD: netis
      POSTGRES_DB: netis
    volumes:
      - netis-pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  netis-data:
  netis-pg:
